<!--
  DEVCONF 2026 landing page foundation.
  This file defines the semantic HTML structure that later steps will fill in.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVCONF 2026 | Developer Conference Landing Page</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <!-- Header and Navigation -->
    <header class="site-header" id="top">
      <nav class="site-nav" aria-label="Main navigation">
        <div class="container">
          <!-- Navbar content will be added in a later step. -->
        </div>
      </nav>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Hero Section -->
      <section class="hero-section" id="hero" aria-labelledby="hero-title">
        <div class="container">
          <h1 id="hero-title" class="visually-hidden">DEVCONF 2026</h1>
          <!-- Hero content will be added in a later step. -->
        </div>
      </section>

      <!-- Speakers Section -->
      <section class="speakers-section" id="speakers" aria-labelledby="speakers-title">
        <div class="container">
          <h2 id="speakers-title" class="visually-hidden">Meet the Speakers</h2>
          <!-- Speaker cards will be added in a later step. -->
        </div>
      </section>

      <!-- Pricing Section -->
      <section class="pricing-section" id="pricing" aria-labelledby="pricing-title">
        <div class="container">
          <h2 id="pricing-title" class="visually-hidden">Secure Your Spot</h2>
          <!-- Pricing cards will be added in a later step. -->
        </div>
      </section>

      <!-- AI Challenge Section -->
      <section class="ai-challenge-section" id="ai-challenge" aria-labelledby="ai-challenge-title">
        <div class="container">
          <h2 id="ai-challenge-title" class="visually-hidden">AI Challenge</h2>
          <!-- AI Challenge content will be added in a later step. -->
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer" id="footer">
      <div class="container">
        <!-- Footer content will be added in a later step. -->
      </div>
    </footer>
  </body>
</html>
